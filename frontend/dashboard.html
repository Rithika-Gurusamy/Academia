<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Academia</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .nav-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }

        .nav-link {
            padding: 0.5rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            color: var(--text-dim);
        }

        .nav-link.active {
            background: var(--primary);
            color: white;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .item-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 16px;
            position: relative;
        }

        .domain-tag {
            background: var(--secondary);
            color: var(--text-main);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            margin-right: 5px;
            display: inline-block;
            margin-top: 5px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .domain-selection-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            background: white;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        /* Mobile responsive for dashboard */
        @media (max-width: 768px) {
            .nav-tabs {
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .nav-link {
                padding: 0.4rem 1rem;
                font-size: 0.85rem;
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
            .modal .glass-card {
                width: 95% !important;
                max-width: 95% !important;
                padding: 1.5rem !important;
            }
        }

        @media (max-width: 480px) {
            .nav-link {
                padding: 0.4rem 0.75rem;
                font-size: 0.8rem;
            }
            .item-card { padding: 1rem; }
            .domain-selection-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body style="display: block;">
    <div class="dashboard-container">
        <header class="header animate-fade">
            <div class="user-profile">
                <div class="avatar" id="avatarTxt">U</div>
                <div>
                    <h2 id="welcomeTxt">Welcome!</h2>
                    <p style="color: var(--text-dim); font-size: 0.9rem;">Student Access</p>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary header-btn" onclick="window.location.href='index.html'">Home</button>
                <button class="btn btn-primary header-btn" onclick="logout()"
                    style="background: #ff4d4d; border-color: #ff4d4d;">Logout</button>
            </div>
        </header>

        <nav class="nav-tabs animate-fade">
            <div class="nav-link active" onclick="switchTab('profile')">Profile</div>
            <div class="nav-link" onclick="switchTab('projects')">Projects</div>
            <div class="nav-link" onclick="switchTab('certifications')">Certifications</div>
        </nav>

        <!-- Profile Section -->
        <section id="profile-section" class="search-card animate-fade">
            <h1 class="title">My Student Profile</h1>
            <p class="subtitle">Enter your Register Number to view or update your profile</p>

            <div style="max-width: 400px; margin: 0 auto;">
                <div class="form-group">
                    <input type="text" id="regNoInput" placeholder="Enter Register Number" style="text-align: center;">
                </div>
                <!-- Error msg for unauthorized -->
                <div id="unauthorizedMsg" style="color: #ff4d4d; margin-top: 10px;" class="hidden"></div>

                <button class="btn btn-primary" onclick="checkProfile()" style="margin-top: 10px;">View My
                    Details</button>
            </div>

            <!-- No Profile Message -->
            <div id="noProfileMsg" class="hidden text-center animate-fade" style="margin-top: 2rem;">
                <div class="glass-card" style="max-width: 100%;">
                    <p>No profile data found for this register number.</p>
                    <button class="btn btn-primary" style="margin-top: 1rem;"
                        onclick="redirectToProfile('create')">Store My Details</button>
                </div>
            </div>
        </section>

        <!-- Projects Section -->
        <section id="projects-section" class="hidden animate-fade">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 class="title" style="text-align: left; margin: 0;">My Projects</h2>
                <button class="btn btn-primary" style="width: auto;" onclick="openModal('project')">+ Add
                    Project</button>
            </div>
            <div id="projectList" class="card-grid">
                <!-- Projects will be loaded here -->
            </div>
        </section>

        <!-- Certifications Section -->
        <section id="certifications-section" class="hidden animate-fade">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 class="title" style="text-align: left; margin: 0;">My Certifications</h2>
                <button class="btn btn-primary" style="width: auto;" onclick="openModal('cert')">+ Add
                    Certification</button>
            </div>
            <div id="certList" class="card-grid">
                <!-- Certifications will be loaded here -->
            </div>
        </section>
    </div>

    <!-- Modals -->
    <div id="itemModal" class="modal">
        <div class="glass-card" style="max-width: 500px;">
            <h3 id="modalTitle" class="title" style="font-size: 1.5rem;">Add New</h3>
            <div class="form-group">
                <label>Description / Title</label>
                <input type="text" id="itemDesc" placeholder="e.g. AI Hand Gesture Recognition">
            </div>
            <div class="form-group">
                <label>Domains (Select Multiple)</label>
                <div id="domainList" class="domain-selection-grid">
                    <!-- Domains will be populated here -->
                </div>
            </div>
            <div class="form-group">
                <label id="linkLabel">Link (GitHub / Certificate)</label>
                <input type="text" id="itemLink" placeholder="https://...">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 1.5rem;">
                <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveItem()">Save Entry</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://academia-ci0l.onrender.com";
        const domains = [
            "ai", "ml", "data science", "cyber", "cloud", "devops", "mlops",
            "full stack", "frontend", "backend", "mobile app development",
            "game development", "ui/ux", "iot", "blockchain", "ar/vr", "big data", "nlp"
        ];
        let currentModalType = '';

        document.getElementById('welcomeTxt').innerText = `Welcome, ${localStorage.getItem('username') || 'Student'}!`;
        document.getElementById('avatarTxt').innerText = (localStorage.getItem('username') || 'U')[0].toUpperCase();

        const savedReg = localStorage.getItem('tempRegNo');
        if (savedReg) {
            const inputEl = document.getElementById('regNoInput');
            if (inputEl) inputEl.value = savedReg;
        }

        async function checkProfile() {
            const regNo = document.getElementById('regNoInput').value;
            const token = localStorage.getItem('access_token');
            if (!token) {
                alert("Please login first.");
                return logout();
            }
            if (!regNo) {
                alert("Please enter a register number");
                return;
            }

            localStorage.setItem('tempRegNo', regNo);
            const msgEl = document.getElementById('unauthorizedMsg');
            msgEl.classList.add('hidden');
            document.getElementById('noProfileMsg').classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}/student/profile/${regNo}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    window.location.href = `profile.html?reg=${regNo}`;
                } else if (response.status === 404) {
                    document.getElementById('noProfileMsg').classList.remove('hidden');
                } else if (response.status === 403) {
                    const data = await response.json();
                    msgEl.innerText = data.detail || "Restricted: You cannot view someone else's profile.";
                    msgEl.classList.remove('hidden');
                } else {
                    alert("Error checking profile");
                }
            } catch (err) {
                alert("Server error connecting to backend");
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            document.querySelector(`.nav-link[onclick="switchTab('${tab}')"]`).classList.add('active');

            document.getElementById('profile-section').classList.add('hidden');
            document.getElementById('projects-section').classList.add('hidden');
            document.getElementById('certifications-section').classList.add('hidden');

            document.getElementById(`${tab}-section`).classList.remove('hidden');

            if (tab === 'projects') loadItems('projects');
            if (tab === 'certifications') loadItems('certifications');
        }

        function openModal(type) {
            const regNo = localStorage.getItem('tempRegNo');
            if (!regNo) {
                alert("Please enter your Register Number on the Profile tab first so we know who you are!");
                switchTab('profile');
                return;
            }

            currentModalType = type;
            document.getElementById('itemModal').classList.add('active');
            document.getElementById('modalTitle').innerText = type === 'project' ? 'Add New Project' : 'Add New Certification';
            document.getElementById('linkLabel').innerText = type === 'project' ? 'GitHub Repository Link' : 'Certificate URL';
            document.getElementById('itemDesc').value = '';
            document.getElementById('itemLink').value = '';

            const domainContainer = document.getElementById('domainList');
            domainContainer.innerHTML = '';
            domains.forEach(d => {
                const label = document.createElement('label');
                label.className = 'filter-checkbox';
                
                const input = document.createElement('input');
                input.type = 'checkbox';
                input.name = 'domain';
                input.value = d;
                
                label.appendChild(input);
                label.appendChild(document.createTextNode(` ${d.toUpperCase()}`));
                domainContainer.appendChild(label);
            });
        }

        function closeModal() {
            document.getElementById('itemModal').classList.remove('active');
        }

        async function saveItem() {
            const regNo = localStorage.getItem('tempRegNo');
            const desc = document.getElementById('itemDesc').value;
            const link = document.getElementById('itemLink').value;
            const selectedDomains = Array.from(document.querySelectorAll('input[name="domain"]:checked')).map(cb => cb.value);

            if (!desc || selectedDomains.length === 0) {
                alert("Please provide a description and at least one domain.");
                return;
            }

            const path = currentModalType === 'project' ? 'projects' : 'certifications';
            const payload = {
                description: desc,
                domains: selectedDomains,
                [currentModalType === 'project' ? 'github_link' : 'certificate_link']: link
            };

            try {
                const token = localStorage.getItem('access_token');
                const response = await fetch(`${API_URL}/student/${regNo}/${path}`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    closeModal();
                    loadItems(path);
                } else {
                    alert("Failed to save entry since no profile details stored , try storing profile details first then you can add projects or certifications.");
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function loadItems(path) {
            const regNo = localStorage.getItem('tempRegNo');
            if (!regNo) return;

            try {
                const token = localStorage.getItem('access_token');
                const response = await fetch(`${API_URL}/student/${regNo}/${path}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (response.ok) {
                    const data = await response.json();
                    renderItems(data, path === 'projects' ? 'projectList' : 'certList');
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderItems(items, containerId) {
            const container = document.getElementById(containerId);
            if (items.length === 0) {
                container.innerHTML = '<p style="color: var(--text-dim); text-align: center; grid-column: 1/-1;">No entries found. Add your first one!</p>';
                return;
            }
            container.innerHTML = '';

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-card animate-fade';
                
                const btn = document.createElement('button');
                btn.style.cssText = 'position: absolute; top: 10px; right: 10px; background: rgba(255, 0, 0, 0.1); color: #ff4444; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center;';
                btn.textContent = '×';
                btn.onclick = () => deleteItem(containerId === 'projectList' ? 'projects' : 'certifications', item.id);
                div.appendChild(btn);

                const h4 = document.createElement('h4');
                h4.style.cssText = 'margin-bottom: 0.5rem; padding-right: 20px;';
                h4.textContent = item.description;
                div.appendChild(h4);

                const domainsDiv = document.createElement('div');
                item.domains.forEach(d => {
                    const span = document.createElement('span');
                    span.className = 'domain-tag';
                    span.textContent = d;
                    domainsDiv.appendChild(span);
                });
                div.appendChild(domainsDiv);

                const footer = document.createElement('div');
                footer.style.cssText = 'margin-top: 1rem; font-size: 0.85rem;';
                
                const link = item.github_link || item.certificate_link;
                if (link) {
                    const a = document.createElement('a');
                    a.href = link;
                    a.target = '_blank';
                    a.style.color = 'var(--primary)';
                    a.textContent = 'View Link';
                    footer.appendChild(a);
                } else {
                    const span = document.createElement('span');
                    span.style.color = 'var(--text-dim)';
                    span.textContent = 'No Link';
                    footer.appendChild(span);
                }

                const dateSpan = document.createElement('span');
                dateSpan.style.float = 'right';
                dateSpan.style.color = 'var(--text-dim)';
                dateSpan.textContent = new Date(item.created_at).toLocaleDateString();
                footer.appendChild(dateSpan);

                div.appendChild(footer);
                container.appendChild(div);
            });
        }

        async function deleteItem(path, id) {
            if (!confirm("Are you sure you want to delete this entry?")) return;

            try {
                const token = localStorage.getItem('access_token');
                const response = await fetch(`${API_URL}/student/${path}/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    loadItems(path);
                } else {
                    alert("Failed to delete entry.");
                }
            } catch (err) {
                console.error(err);
            }
        }

        function redirectToProfile(mode) {
            const regNo = localStorage.getItem('tempRegNo');
            window.location.href = `profile.html?reg=${regNo}&mode=${mode}`;
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>

</html>
