<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile | Academia</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --accent: #08CB00;
            --accent-glow: rgba(8, 203, 0, 0.2);
            --bg-dark: #f0f7ed;
            --bg-card: rgba(255, 255, 255, 0.85);
            --text-main: #061a00;
            --text-dim: #2d4a1e;
            --glass-border: rgba(8, 203, 0, 0.15);
            --success: #07ac00;
            --secondary: #AEEA94;
            --highlight: #E4FF30;
        }

        body {
            background: linear-gradient(135deg, #f0f7ed 0%, #e1f0db 100%);
            min-height: 100vh;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            padding: 2rem 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .profile-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            position: sticky;
            top: 1rem;
            z-index: 50;
            background: rgba(255, 255, 255, 0.9);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }

        .header h1 {
            font-size: 1.5rem;
            margin: 0;
            background: linear-gradient(to right, #08CB00, #07ac00);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section {
            margin-bottom: 3rem;
            animation: slideUp 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--accent), transparent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dim);
        }

        input,
        select,
        textarea {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        input:disabled,
        select:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            border-color: transparent;
            background: rgba(0, 0, 0, 0.02);
            color: var(--text-dim);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.5);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .checkbox-item:hover {
            background: rgba(8, 203, 0, 0.05);
        }

        .checkbox-item input {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: var(--accent);
        }

        .btn {
            padding: 0.75rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(to right, var(--accent), var(--success));
            color: white;
            box-shadow: 0 10px 15px -3px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -5px var(--accent-glow);
        }

        .btn-outline {
            background: white;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: rgba(8, 203, 0, 0.03);
            border-color: var(--accent);
        }

        .badge {
            padding: 0.35rem 0.75rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-view {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .badge-edit {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .badge-create {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .hidden {
            display: none !important;
        }

        /* Animation for sections */
        .section:nth-child(1) {
            animation-delay: 0.1s;
        }

        .section:nth-child(2) {
            animation-delay: 0.2s;
        }

        .section:nth-child(3) {
            animation-delay: 0.3s;
        }

        .section:nth-child(4) {
            animation-delay: 0.4s;
        }

        .section:nth-child(5) {
            animation-delay: 0.5s;
        }

        /* Mobile responsive for profile page */
        @media (max-width: 768px) {
            body {
                padding: 1rem 0;
            }

            .container {
                padding: 0 0.75rem;
            }

            .profile-card {
                padding: 1.5rem;
                border-radius: 16px;
            }

            .header {
                flex-direction: column;
                gap: 0.75rem;
                align-items: flex-start;
                padding: 0.75rem 1rem;
                position: relative;
                top: 0;
                margin-bottom: 1.5rem;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .checkbox-group {
                flex-direction: column;
                padding: 1rem;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 0.5rem;
            }

            .profile-card {
                padding: 1rem;
            }

            .section-title {
                font-size: 0.9rem;
            }

            .badge {
                font-size: 0.65rem;
            }

            .header-actions {
                flex-direction: column;
            }

            .header-actions .btn {
                width: 100%;
            }
        }

        /* Help Tip Bar */
        .help-tip-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #061a00, #0d3300);
            color: #AEEA94;
            padding: 1rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            font-size: 1.05rem;
            font-weight: 500;
            z-index: 100;
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.25);
            animation: slideUpTip 0.5s ease-out forwards;
        }

        @keyframes slideUpTip {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .help-tip-bar .tip-icon {
            font-size: 1.4rem;
            animation: bounceTip 2s infinite;
        }

        @keyframes bounceTip {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-5px);
            }

            60% {
                transform: translateY(-3px);
            }
        }

        .help-tip-bar .close-tip {
            position: absolute;
            right: 1.5rem;
            cursor: pointer;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            transition: color 0.2s, transform 0.2s;
        }

        .help-tip-bar .close-tip:hover {
            color: white;
            transform: scale(1.1);
        }

        /* Bigger header buttons */
        .header-actions {
            display: flex;
            gap: 1.2rem;
        }

        .header-actions .btn {
            padding: 0.9rem 2rem;
            font-size: 1.1rem;
            border-radius: 18px;
            min-width: 160px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .header-actions .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        #editBtn {
            animation: pulse-edit 2s infinite;
        }

        #saveBtn {
            animation: pulse-save 2s infinite;
        }

        @keyframes pulse-edit {
            0% {
                box-shadow: 0 0 0 0 rgba(8, 203, 0, 0.4);
            }

            70% {
                box-shadow: 0 0 0 12px rgba(8, 203, 0, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(8, 203, 0, 0);
            }
        }

        @keyframes pulse-save {
            0% {
                box-shadow: 0 0 0 0 rgba(7, 172, 0, 0.4);
            }

            70% {
                box-shadow: 0 0 0 12px rgba(7, 172, 0, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(7, 172, 0, 0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 id="pageTitle">Student Profile</h1>
                <span id="modeBadge" class="badge">View Mode</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" style="background: var(--text-dim);" onclick="handleBack()">←

                <button id="editBtn" class="btn btn-primary" onclick="enableEdit()">Edit Profile</button>
                <button id="saveBtn" class="btn btn-primary hidden" style="background: var(--success);"

        </div>

        <div class="profile-card">

            <form id="profileForm" class="hidden"

                        </div>
                        <div class="form-group">

                        <div class="form-group">
                            <label>Father's Name</label>

                        </div>
                        <div class="form-group">
                            <label>Father's Number</label>

                    <div class="section-title">Bank Account Details</div>
                    <div class="grid">
                        <div class="form-group">

        </div>
        </form>

        <div id="extraSections"
            style="margin-top: 3rem; border-top: 1px dashed var(--glass-border); padding-top: 2rem;">
            <!-- 1) Projects Section -->
            <div class="section" style="opacity: 1;">
                <div class="section-title" style="color: var(--primary);">Academic Projects</div>
                <div id="projectList" class="card-grid"
                    style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
                    <p style="color: var(--text-dim); padding: 1rem;">Loading projects...</p>
                </div>
            </div>

            <!-- 2) Certifications Section -->
            <div class="section" style="opacity: 1;">
                <div class="section-title" style="color: var(--primary);">Certifications</div>
                <div id="certList" class="card-grid"
                    style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
                    <p style="color: var(--text-dim); padding: 1rem;">Loading certifications...</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_URL = "https://academia-ci0l.onrender.com";
        const urlParams = new URLSearchParams(window.location.search);
        const regNo = urlParams.get('reg');
        const mode = urlParams.get('mode');

        function handleBack() {
            const role = localStorage.getItem('role');
            window.location.href = role === 'faculty' ? "faculty_dashboard.html" : "dashboard.html";
        }

        window.onload = async () => {
            const role = localStorage.getItem('role');
            if (regNo) document.getElementById('register_no').value = regNo;

            // Apply student-specific UI layout (hide projects/certs, auto-expand form)
            if (role !== 'faculty') {
                const extra = document.getElementById('extraSections');
                if (extra) extra.classList.add('hidden');

                const form = document.getElementById('profileForm');
                if (form) {
                    form.classList.remove('hidden');
                    form.style.border = 'none';
                    form.style.marginTop = '0';
                    form.style.paddingTop = '0';
                }

                const toggleContainer = document.getElementById('toggleProfileBtn').parentElement;
                if (toggleContainer) toggleContainer.classList.add('hidden');
            }

            if (mode === 'create') {
                enableEdit();
                document.getElementById('modeBadge').innerText = "Create Mode";
                document.getElementById('modeBadge').className = "badge badge-create";
                document.getElementById('editBtn').classList.add('hidden');
                document.getElementById('register_no').disabled = false;
            } else {
                await loadProfile();
                if (role === 'faculty') {
                    document.getElementById('editBtn').classList.add('hidden');
                    // Fetch and show extra items for faculty
                    fetchExtraItems(regNo, 'projects', 'projectList');
                    fetchExtraItems(regNo, 'certifications', 'certList');
                }

                if (mode === 'edit') {
                    toggleFullProfile(true);
                }
            }
        };

        function toggleFullProfile(forceShow = false) {
            const form = document.getElementById('profileForm');
            const btn = document.getElementById('toggleProfileBtn');

            if (forceShow || form.classList.contains('hidden')) {
                form.classList.remove('hidden');
                btn.innerText = "Hide Complete Student Info ▴";
            } else {
                form.classList.add('hidden');
                btn.innerText = "View Complete Student Info ▾";
            }
        }

        async function loadProfile() {
            try {
                const userId = localStorage.getItem('user_id');
                const token = localStorage.getItem('access_token');
                if (!token) {
                    alert('Session expired. Please login again.');
                    logout();
                    return;
                }
                const response = await fetch(`${API_URL}/student/profile/${regNo}?user_id=${userId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    Object.keys(data).forEach(key => {
                        const el = document.getElementById(key);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key] || "";
                            }
                        }
                    });
                    document.getElementById('modeBadge').innerText = "View Mode";
                    document.getElementById('modeBadge').className = "badge badge-view";
                }
            } catch (err) {
                console.error("Error loading profile", err);
            }
        }

        function enableEdit() {
            document.querySelectorAll('input, select').forEach(el => el.disabled = false);
            if (mode !== 'create') document.getElementById('register_no').disabled = true;

            document.getElementById('editBtn').classList.add('hidden');
            document.getElementById('saveBtn').classList.remove('hidden');
            document.getElementById('modeBadge').innerText = (mode === 'create') ? "Create Mode" : "Edit Mode";
            document.getElementById('modeBadge').className = (mode === 'create') ? "badge badge-create" : "badge badge-edit";
        }

        async function saveProfile() {
            const form = document.getElementById('profileForm');
            const data = {};

            form.querySelectorAll('input, select').forEach(el => {
                if (el.id) {
                    if (el.type === 'checkbox') {
                        data[el.id] = el.checked;
                    } else if (el.value !== "") {
                        data[el.id] = el.value;
                    } else {
                        data[el.id] = null;
                    }
                }
            });

            const userId = localStorage.getItem('user_id');
            const token = localStorage.getItem('access_token');
            const method = (mode === 'create') ? 'POST' : 'PUT';
            const endpoint = (mode === 'create') ? `${API_URL}/student/profile?user_id=${userId}` : `${API_URL}/student/profile/${regNo}?user_id=${userId}`;

            try {
                const response = await fetch(endpoint, {
                    method: method,
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert("Profile saved successfully!");
                    window.location.href = "dashboard.html";
                } else {
                    const err = await response.json();
                    alert("Error saving: " + JSON.stringify(err.detail));
                }
            } catch (err) {
                alert("Server error connecting to backend");
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        async function fetchExtraItems(regNo, path, containerId) {
            try {
                const token = localStorage.getItem('access_token');
                const response = await fetch(`${API_URL}/student/${regNo}/${path}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (response.ok) {
                    const items = await response.json();
                    const container = document.getElementById(containerId);
                    if (items.length === 0) {
                        container.innerHTML = `<p style="color: var(--text-dim); padding: 1rem;">No ${path} available.</p>`;
                        return;
                    }

                    container.innerHTML = items.map(item => `
                        <div class="item-card" style="padding: 1.5rem; border: 1px solid var(--glass-border); border-radius: 16px; background: white; margin-top: 1rem;">
                            <h4 style="margin-bottom: 0.5rem;">${item.description}</h4>
                            <div style="margin-bottom: 0.5rem;">
                                ${item.domains.map(d => `<span class="domain-tag" style="background: var(--secondary); padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; margin-right: 5px;">${d}</span>`).join('')}
                            </div>
                            <div style="font-size: 0.85rem;">
                                ${item.github_link || item.certificate_link ? `<a href="${item.github_link || item.certificate_link}" target="_blank" style="color: var(--accent);">View Link</a>` : ''}
                                <span style="float: right; color: var(--text-dim);">${new Date(item.created_at).toLocaleDateString()}</span>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error(err);
            }
        }
    </script>
    <!-- Help Tip Bar for first-time users -->
    <div class="help-tip-bar" id="helpTipBar">
        <span class="tip-icon">💡</span>
        <span id="helpTipText">Tap <strong>Edit Profile</strong> at the top to update your details, then hit
            <strong>Save Changes</strong></span>
        <span class="close-tip"
            onclick="document.getElementById('helpTipBar').style.display='none'; localStorage.setItem('helpTipDismissed','1');">✕</span>
    </div>
    <script>
        // Auto-hide help tip if dismissed before, if role is faculty, or after 15 seconds
        if (localStorage.getItem('helpTipDismissed') === '1' || localStorage.getItem('role') === 'faculty') {
            document.getElementById('helpTipBar').style.display = 'none';
        } else {
            setTimeout(() => {
                const bar = document.getElementById('helpTipBar');
                if (bar) bar.style.display = 'none';
            }, 15000);
        }
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>

</html>
